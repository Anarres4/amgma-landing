head:
  number: "N° 001 · Première œuvre"
  tag: "● Live sur l'App Store"

title_html: "Book <em>Nova.</em>"

lede: >-
  L'application qui transforme votre façon de lire. Scannez un livre,
  découvrez sa profondeur, construisez votre bibliothèque vivante —
  et redonnez sa place à la lecture, une page à la fois.

features:
  - num: "01"
    label: "Scans illimités"
    desc: "Identifiez n'importe quel livre"
  - num: "02"
    label: "Recommandations éditoriales"
    desc: "Humaines, pas algorithmiques"
  - num: "03"
    label: "Statistiques de lecture"
    desc: "Votre carnet vivant"
  - num: "04"
    label: "Bibliothèque enrichie"
    desc: "Chaque livre, une histoire"

ctas:
  - label: "Visiter book-nova.com"
    href: "https://book-nova.com/"
    variant: primary
    arrow: true
    target: "_blank"
  - label: "Dossier presse"
    href: "#contact"
    variant: ghost

