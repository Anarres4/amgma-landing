title_html: "Trois convictions <em>qui tiennent</em> nos projets."

items:
  - num: "01 — Édition"
    title_html: "Un logiciel, <em>un propos.</em>"
    text: >-
      Chaque application AMGMA répond à une question précise.
      Nous supprimons avant d'ajouter. Le reste est du bruit.
  - num: "02 — Artisanat"
    title_html: "Le soin <em>comme cahier des charges.</em>"
    text: >-
      Typographie, animation, copywriting, son — rien n'est accessoire.
      Nos produits se reconnaissent à la seconde.
  - num: "03 — Indépendance"
    title_html: "Pas de pression <em>extérieure.</em>"
    text: >-
      Auto-financé, sans investisseur. Nos décisions répondent aux
      utilisateurs, pas aux tableaux de bord trimestriels.
