<!DOCTYPE html>
<html lang="{{ site.lang | default: 'fr' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title | split: ' — ' | first }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <link rel="canonical" href="{{ page.url | absolute_url }}" />
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}" />
  <link rel="alternate icon" href="{{ '/assets/favicon.ico' | relative_url }}" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ site.title }}" />
  <meta property="og:description" content="{{ site.description }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:locale" content="{{ site.locale }}" />
  <meta property="og:image" content="{{ '/assets/og-image.png' | absolute_url }}" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="AMGMA — Studio logiciel indépendant, Toulouse" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ site.title }}" />
  <meta name="twitter:description" content="{{ site.description }}" />
  <meta name="twitter:image" content="{{ '/assets/og-image.png' | absolute_url }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Inter:wght@300..800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://anarres4.github.io/amgma-landing/#organization",
        "name": "AMGMA SAS",
        "alternateName": "AMGMA",
        "url": "https://anarres4.github.io/amgma-landing/",
        "email": "amgma@outlook.fr",
        "foundingDate": "2025",
        "description": "AMGMA est un studio logiciel indépendant. Nous éditons Book Nova, l'application qui transforme votre façon de lire.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Toulouse",
          "addressCountry": "FR"
        },
        "founder": [
          { "@id": "https://anarres4.github.io/amgma-landing/#ana-gutierrez" },
          { "@id": "https://anarres4.github.io/amgma-landing/#florent-sandri" }
        ],
        "makesOffer": {
          "@type": "Offer",
          "itemOffered": { "@id": "https://anarres4.github.io/amgma-landing/#book-nova" }
        },
        "sameAs": [
          "https://book-nova.com/"
        ]
      },
      {
        "@type": "WebSite",
        "@id": "https://anarres4.github.io/amgma-landing/#website",
        "url": "https://anarres4.github.io/amgma-landing/",
        "name": "AMGMA — Studio logiciel indépendant",
        "description": "AMGMA est un studio logiciel indépendant. Nous éditons Book Nova, l'application qui transforme votre façon de lire.",
        "inLanguage": "fr-FR",
        "publisher": { "@id": "https://anarres4.github.io/amgma-landing/#organization" }
      },
      {
        "@type": "MobileApplication",
        "@id": "https://anarres4.github.io/amgma-landing/#book-nova",
        "name": "Book Nova",
        "url": "https://book-nova.com/",
        "description": "L'application qui transforme votre façon de lire. Scannez un livre, découvrez sa profondeur, construisez votre bibliothèque vivante.",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "iOS, Android",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR",
          "availability": "https://schema.org/InStock"
        },
        "author": { "@id": "https://anarres4.github.io/amgma-landing/#organization" }
      },
      {
        "@type": "Person",
        "@id": "https://anarres4.github.io/amgma-landing/#ana-gutierrez",
        "name": "Ana Gutierrez",
        "jobTitle": "Présidente, Co-fondatrice",
        "worksFor": { "@id": "https://anarres4.github.io/amgma-landing/#organization" },
        "description": "Ana dirige la vision produit et la stratégie d'AMGMA."
      },
      {
        "@type": "Person",
        "@id": "https://anarres4.github.io/amgma-landing/#florent-sandri",
        "name": "Florent Sandri",
        "jobTitle": "Directeur général, Co-fondateur",
        "worksFor": { "@id": "https://anarres4.github.io/amgma-landing/#organization" },
        "description": "Florent pilote les opérations, la tech et le développement commercial d'AMGMA."
      }
    ]
  }
  </script>
</head>
<body>

  <a href="#main" class="skip-link">Aller au contenu</a>

  {% include nav.html %}

  <main id="main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/reveal.js' | relative_url }}" defer></script>
</body>
</html>
