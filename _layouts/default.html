<!DOCTYPE html>
<html lang="{{ site.lang | default: 'fr' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title | split: ' — ' | first }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <link rel="canonical" href="{{ page.url | absolute_url }}" />

  <script>
    // Applique le thème avant rendu pour éviter le FOUC
    (function () {
      try {
        var t = localStorage.getItem('amgma-theme');
        if (t === 'light') document.documentElement.classList.add('theme-light');
      } catch (e) {}
    })();
  </script>

  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}" />
  <link rel="icon" type="image/png" sizes="48x48" href="{{ '/assets/favicon-48.png' | relative_url }}" />
  <link rel="icon" type="image/png" sizes="192x192" href="{{ '/assets/favicon-192.png' | relative_url }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | relative_url }}" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ site.title }}" />
  <meta property="og:description" content="{{ site.description }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:locale" content="{{ site.locale }}" />
  <meta property="og:image" content="{{ '/assets/og-image.png' | absolute_url }}" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="AMGMA — Studio logiciel indépendant, Toulouse" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ site.title }}" />
  <meta name="twitter:description" content="{{ site.description }}" />
  <meta name="twitter:image" content="{{ '/assets/og-image.png' | absolute_url }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Inter:wght@300..800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://amgma.fr/#organization",
        "name": "AMGMA SAS",
        "alternateName": "AMGMA",
        "url": "https://amgma.fr/",
        "email": "amgma@outlook.fr",
        "foundingDate": "2025",
        "description": "AMGMA est un studio logiciel indépendant. Nous éditons Book Nova, l'application qui transforme votre façon de lire.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Toulouse",
          "addressCountry": "FR"
        },
        "founder": [
          { "@id": "https://amgma.fr/#ana-gutierrez" },
          { "@id": "https://amgma.fr/#florent-sandri" }
        ],
        "makesOffer": {
          "@type": "Offer",
          "itemOffered": { "@id": "https://amgma.fr/#book-nova" }
        },
        "sameAs": [
          "https://book-nova.com/",
          "https://apps.apple.com/fr/app/book-nova/id6752571289",
          "https://play.google.com/store/apps/details?id=com.quantumash.bigbangbook.app"
        ],
        "vatID": "FR59990522435",
        "taxID": "990522435",
        "legalName": "AMGMA"
      },
      {
        "@type": "WebSite",
        "@id": "https://amgma.fr/#website",
        "url": "https://amgma.fr/",
        "name": "AMGMA — Studio logiciel indépendant",
        "description": "AMGMA est un studio logiciel indépendant. Nous éditons Book Nova, l'application qui transforme votre façon de lire.",
        "inLanguage": "fr-FR",
        "publisher": { "@id": "https://amgma.fr/#organization" }
      },
      {
        "@type": "MobileApplication",
        "@id": "https://amgma.fr/#book-nova",
        "name": "Book Nova",
        "url": "https://book-nova.com/",
        "description": "L'application qui transforme votre façon de lire. Scannez un livre, découvrez sa profondeur, construisez votre bibliothèque vivante.",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "iOS, Android",
        "downloadUrl": [
          "https://apps.apple.com/fr/app/book-nova/id6752571289",
          "https://play.google.com/store/apps/details?id=com.quantumash.bigbangbook.app"
        ],
        "installUrl": "https://apps.apple.com/fr/app/book-nova/id6752571289",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR",
          "availability": "https://schema.org/InStock"
        },
        "author": { "@id": "https://amgma.fr/#organization" }
      },
      {
        "@type": "Person",
        "@id": "https://amgma.fr/#ana-gutierrez",
        "name": "Ana Gutierrez",
        "jobTitle": "Présidente, Co-fondatrice",
        "worksFor": { "@id": "https://amgma.fr/#organization" },
        "description": "Ana dirige la vision produit et la stratégie d'AMGMA."
      },
      {
        "@type": "Person",
        "@id": "https://amgma.fr/#florent-sandri",
        "name": "Florent Sandri",
        "jobTitle": "Directeur général, Co-fondateur",
        "worksFor": { "@id": "https://amgma.fr/#organization" },
        "description": "Florent pilote les opérations, la tech et le développement commercial d'AMGMA."
      }
    ]
  }
  </script>
</head>
<body>

  <a href="#main" class="skip-link">Aller au contenu</a>

  {% include nav.html %}

  <main id="main">
    {{ content }}
  </main>

  {% include footer.html %}

  <button type="button" class="theme-fab" data-theme-toggle
          aria-pressed="false" aria-label="Basculer entre mode nuit et jour">
    <svg class="icon-moon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="icon-sun" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
  </button>

  <script src="{{ '/assets/js/reveal.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
</body>
</html>
